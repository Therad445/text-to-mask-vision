# Prompt presets used in the qualitative gallery experiments.

prompts:
  crowded_bears:
    prompt: "bear ."
    purpose: "crowded scene / tuned error analysis"

  bear_cub_prompt:
    prompt: "bear cub ."
    purpose: "prompt sensitivity on the same bear image"

  bus_person_multi_object:
    prompt: "bus . person ."
    purpose: "multi-object open-vocabulary detection"

  person_clear_case:
    prompt: "person ."
    purpose: "simple success case"

  weak_prompt_case:
    prompt: "small animal ."
    purpose: "mismatched prompt / limitation case"

default_thresholds:
  box_threshold: 0.25
  text_threshold: 0.25
  nms_iou_threshold: 0.45
  max_detections: 4

demo_preset:
  prompt: "bear ."
  box_threshold: 0.25
  text_threshold: 0.30
  nms_iou_threshold: 0.35
  max_detections: 8
  note: "Default live-demo preset for reproducing the final crowded-bears result."

final_crowded_bears:
  raw_detections: 8
  final_detections: 5
  mean_box_score: 0.399
  mean_mask_score: 0.971
